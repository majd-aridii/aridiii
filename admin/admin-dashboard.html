<!DOCTYPE html>
<html>
<head>
  <title>Admin Dashboard</title>
  <style>
    body{
      background:#070A12;
      color:white;
      font-family:Poppins, sans-serif;
      padding:40px;
    }

    h1{ color:#F5C542; }

    .card{
      background:rgba(255,255,255,.05);
      padding:20px;
      border-radius:16px;
      border:1px solid rgba(255,255,255,.1);
      margin-top:20px;
    }

    input{
      display:block;
      width:100%;
      margin:10px 0;
      padding:10px;
      border-radius:10px;
      border:1px solid rgba(255,255,255,.2);
      background:rgba(255,255,255,.05);
      color:white;
    }

    button{
      padding:10px 14px;
      border-radius:10px;
      border:0;
      cursor:pointer;
      background:#F5C542;
      font-weight:bold;
      margin-top:10px;
    }

    .product{
      background:rgba(255,255,255,.05);
      padding:10px;
      margin-top:10px;
      border-radius:10px;
      display:flex;
      justify-content:space-between;
      align-items:center;
    }

    .delete-btn{
      background:#FF4D6D;
      color:white;
      padding:6px 10px;
      border-radius:8px;
    }
  </style>
</head>
<body>

<h1>Admin Dashboard</h1>

<div class="card">
  <input id="productName" placeholder="Product Name">
  <input id="productPrice" type="number" placeholder="Price">
  <input id="productCategory" placeholder="Category (example: phones)">
  <input type="file" id="productImage" accept="image/*">
  <button id="addProductBtn">Add Product</button>
</div>

<div class="card">
  <h3>Products</h3>
  <div id="productList"></div>
</div>

<button id="logoutBtn">Logout</button>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { getStorage, ref, uploadBytes, getDownloadURL } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

const firebaseConfig = {
  apiKey: "AIzaSyAn9L3zdvL39DZGHnXM3XmiJAPyNZgr5c8",
  authDomain: "aridiitechadmin.firebaseapp.com",
  projectId: "aridiitechadmin",
  storageBucket: "aridiitechadmin.firebasestorage.app",
  messagingSenderId: "623026525253",
  appId: "1:623026525253:web:b80ffb3324a68314d33f2c"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

/* 🔥 IMPORTANT — FORCE CORRECT BUCKET */
const storage = getStorage(app, "gs://aridiitechadmin.firebasestorage.app");

/* ================= LOGOUT ================= */

document.getElementById("logoutBtn").addEventListener("click", () => {
  signOut(auth).then(() => {
    window.location.href = "admin-login.html";
  });
});

/* ================= ADD PRODUCT ================= */

async function addProduct(){

  const name = document.getElementById("productName").value.trim();
  const price = Number(document.getElementById("productPrice").value);
  const category = document.getElementById("productCategory").value.trim();
  const imageFile = document.getElementById("productImage").files[0];

  if (!name || !price || !category || !imageFile) {
    alert("Please fill all fields");
    return;
  }

  try {

    const fileName = Date.now() + "_" + imageFile.name;
    const imageRef = ref(storage, "products/" + fileName);

    console.log("Uploading to bucket:", storage.app.options.storageBucket);

    await uploadBytes(imageRef, imageFile);

    const imageURL = await getDownloadURL(imageRef);

    await addDoc(collection(db, "products"), {
      name,
      price,
      category,
      image: imageURL
    });

    alert("Product Added Successfully!");

    document.getElementById("productName").value = "";
    document.getElementById("productPrice").value = "";
    document.getElementById("productCategory").value = "";
    document.getElementById("productImage").value = "";

    loadProducts();

  } catch(error){
    console.error("Upload Error:", error);
    alert("Upload failed. Check console.");
  }
}

/* ================= LOAD PRODUCTS ================= */

async function loadProducts(){
  const querySnapshot = await getDocs(collection(db, "products"));
  const list = document.getElementById("productList");
  list.innerHTML = "";

  querySnapshot.forEach((docSnap) => {
    const data = docSnap.data();

    const productDiv = document.createElement("div");
    productDiv.className = "product";

    productDiv.innerHTML = `
      <span>${data.name} - $${data.price}</span>
      <button class="delete-btn">Delete</button>
    `;

    productDiv.querySelector(".delete-btn")
      .addEventListener("click", async () => {
        await deleteDoc(doc(db, "products", docSnap.id));
        loadProducts();
      });

    list.appendChild(productDiv);
  });
}

/* ================= EVENTS ================= */

document.getElementById("addProductBtn")
  .addEventListener("click", addProduct);

loadProducts();

</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <title>Admin Dashboard</title>
  <style>
    body{
      background:#070A12;
      color:white;
      font-family:Poppins;
      padding:40px;
    }

    h1{ color:#F5C542; }

    .card{
      background:rgba(255,255,255,.05);
      padding:20px;
      border-radius:16px;
      border:1px solid rgba(255,255,255,.1);
      margin-top:20px;
    }

    input{
      display:block;
      width:100%;
      margin:10px 0;
      padding:10px;
      border-radius:10px;
      border:1px solid rgba(255,255,255,.2);
      background:rgba(255,255,255,.05);
      color:white;
    }

    button{
      padding:10px 14px;
      border-radius:10px;
      border:0;
      cursor:pointer;
      background:#F5C542;
      font-weight:bold;
      margin-top:10px;
    }

    .product{
      background:rgba(255,255,255,.05);
      padding:10px;
      margin-top:10px;
      border-radius:10px;
    }

    .delete-btn{
      background:#FF4D6D;
      color:white;
      margin-left:10px;
    }
  </style>
</head>
<body>

<h1>Admin Dashboard</h1>

<div class="card">
<input id="productName" placeholder="Product Name">
<input id="productPrice" placeholder="Price">
<input id="productCategory" placeholder="Category">
<input type="file" id="productImage" accept="image/*">
<button onclick="addProduct()">Add Product</button>
</div>

<div class="card">
  <h3>Products</h3>
  <div id="productList"></div>
</div>

<button onclick="logout()">Logout</button>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAn9L3zdvL39DZGHnXM3XmiJAPyNZgr5c8",
  authDomain: "aridiitechadmin.firebaseapp.com",
  projectId: "aridiitechadmin",
  storageBucket: "aridiitechadmin.firebasestorage.app",
  messagingSenderId: "623026525253",
  appId: "1:623026525253:web:b80ffb3324a68314d33f2c"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

window.logout = function(){
  signOut(auth).then(() => {
    window.location.href = "admin-login.html";
  });
}

window.addProduct = async function(){
  const name = document.getElementById("name").value;
  const price = Number(document.getElementById("price").value);
  const category = document.getElementById("category").value;
  const image = document.getElementById("image").value;

  await addDoc(collection(db, "products"), {
    name,
    price,
    category,
    image
  });

  loadProducts();
}

async function loadProducts(){
  const querySnapshot = await getDocs(collection(db, "products"));
  const list = document.getElementById("productList");
  list.innerHTML = "";

  querySnapshot.forEach((docSnap) => {
    const data = docSnap.data();

    list.innerHTML += `
      <div class="product">
        ${data.name} - $${data.price}
        <button class="delete-btn" onclick="deleteProduct('${docSnap.id}')">Delete</button>
      </div>
    `;
  });
}

window.deleteProduct = async function(id){
  await deleteDoc(doc(db, "products", id));
  loadProducts();
}

loadProducts();
</script>

</body>
</html>

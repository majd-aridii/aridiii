<!DOCTYPE html>
<html>
<head>
  <title>Admin Login</title>
  <script type="module" src="admin.js"></script>
  <style>
    body{
      background:#070A12;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
      font-family:Poppins;
      color:white;
    }
    .box{
      background:rgba(255,255,255,.05);
      padding:30px;
      border-radius:18px;
      width:320px;
      text-align:center;
      border:1px solid rgba(255,255,255,.1);
    }
    input{
      width:100%;
      padding:10px;
      margin:10px 0;
      border-radius:10px;
      border:1px solid rgba(255,255,255,.2);
      background:rgba(255,255,255,.05);
      color:white;
    }
    button{
      width:100%;
      padding:12px;
      border-radius:12px;
      border:0;
      background:#F5C542;
      font-weight:bold;
      cursor:pointer;
    }
  </style>
</head>
<body>

<div class="box">
  <h2>Admin Login</h2>
  <input type="email" id="email" placeholder="Email">
  <input type="password" id="password" placeholder="Password">
  <button id="loginBtn">Login</button>
</div>

</body>
</html>
